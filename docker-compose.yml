services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: climatedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/climatedb
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      FIRST_SUPERADMIN_EMAIL: admin@example.com
      FIRST_SUPERADMIN_PASSWORD: admin123456
      CORS_ORIGINS: http://localhost:5173,http://localhost
      SHAPEFILE_DIR: /data/shapefiles
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend

  # Nginx reverse proxy — development mode (HTTP only, proxies to frontend dev server)
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
