services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: climatedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/climatedb
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      FIRST_SUPERADMIN_EMAIL: admin@example.com
      FIRST_SUPERADMIN_PASSWORD: admin123456
      CORS_ORIGINS: http://localhost:5173
      SHAPEFILE_DIR: /data/shapefiles
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend

volumes:
  pgdata:
