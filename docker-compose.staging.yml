# Staging override — production builds, HTTP only (no SSL)
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build

services:
  db:
    ports: []

  backend:
    build: ./backend
    ports: []
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/climatedb
      CORS_ORIGINS: https://oxfam.capec.consulting
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379/0
    secrets:
      - jwt_secret
      - superadmin_password
    volumes:
      - ./data:/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports: []

  celery_worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/climatedb
      CORS_ORIGINS: https://oxfam.capec.consulting
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379/0
    secrets:
      - jwt_secret
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      target: production
    entrypoint: ["sh", "-c", "cp -a /usr/share/nginx/html/. /frontend_dist/ && echo 'Frontend dist copied.'"]
    volumes:
      - frontend_dist:/frontend_dist
    ports: []

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  superadmin_password:
    file: ./secrets/superadmin_password.txt

volumes:
  frontend_dist:
  redis_data:
