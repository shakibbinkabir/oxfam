# Staging override — production builds, HTTP only (no SSL)
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build

services:
  db:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports: []
    secrets:
      - db_password

  backend:
    build: ./backend
    ports: []
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/climatedb
      CORS_ORIGINS: http://72.60.43.44
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379/0
    secrets:
      - jwt_secret
      - superadmin_password
      - db_password
    volumes:
      - ./data:/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports: []

  celery_worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/climatedb
      CORS_ORIGINS: http://72.60.43.44
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379/0
    secrets:
      - jwt_secret
      - db_password
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      target: production
    ports: []

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  superadmin_password:
    file: ./secrets/superadmin_password.txt
  db_password:
    file: ./secrets/db_password.txt

volumes:
  frontend_dist:
  redis_data:
